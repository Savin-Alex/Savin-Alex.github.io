<svg width="960" height="520" viewBox="0 0 960 520" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="960" height="520" rx="16" fill="#FAFBFC"/>

  <text x="40" y="40" fill="#0F172A" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="700">Architecture overview</text>

  <!-- Column 1: Renderer -->
  <rect x="40" y="70" width="260" height="420" rx="12" fill="#EEF2FF" stroke="#C7D2FE" stroke-width="1"/>
  <text x="60" y="98" fill="#3730A3" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700">Renderer</text>
  <text x="60" y="116" fill="#6366F1" font-family="system-ui, -apple-system, sans-serif" font-size="11">User-facing windows</text>

  <rect x="60" y="134" width="220" height="60" rx="8" fill="white" stroke="#E2E8F0" stroke-width="1"/>
  <text x="80" y="160" fill="#0F172A" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600">Main Window</text>
  <text x="80" y="178" fill="#64748B" font-family="system-ui, -apple-system, sans-serif" font-size="11">Session mode, start/stop, settings</text>

  <rect x="60" y="206" width="220" height="60" rx="8" fill="white" stroke="#E2E8F0" stroke-width="1"/>
  <text x="80" y="232" fill="#0F172A" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600">Transcript Window</text>
  <text x="80" y="250" fill="#64748B" font-family="system-ui, -apple-system, sans-serif" font-size="11">Final + interim lines, speaker labels</text>

  <rect x="60" y="278" width="220" height="60" rx="8" fill="white" stroke="#E2E8F0" stroke-width="1"/>
  <text x="80" y="304" fill="#0F172A" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600">Companion Overlay</text>
  <text x="80" y="322" fill="#64748B" font-family="system-ui, -apple-system, sans-serif" font-size="11">Always-on-top suggestion surface</text>

  <rect x="60" y="350" width="220" height="60" rx="8" fill="white" stroke="#E2E8F0" stroke-width="1"/>
  <text x="80" y="376" fill="#0F172A" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600">Audio Capture</text>
  <text x="80" y="394" fill="#64748B" font-family="system-ui, -apple-system, sans-serif" font-size="11">Mic + system audio, downsample to 16 kHz</text>

  <text x="60" y="452" fill="#94A3B8" font-family="system-ui, -apple-system, sans-serif" font-size="11">React + AudioWorklet</text>

  <!-- Arrow 1 -> 2 -->
  <path d="M300 260 L350 260" stroke="#94A3B8" stroke-width="2" stroke-linecap="round" marker-end="url(#arrowhead)"/>
  <text x="308" y="252" fill="#94A3B8" font-family="system-ui, -apple-system, sans-serif" font-size="10">IPC</text>

  <!-- Column 2: Main Process -->
  <rect x="350" y="70" width="260" height="420" rx="12" fill="#ECFDF5" stroke="#A7F3D0" stroke-width="1"/>
  <text x="370" y="98" fill="#166534" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700">Main Process</text>
  <text x="370" y="116" fill="#16A34A" font-family="system-ui, -apple-system, sans-serif" font-size="11">Orchestration layer</text>

  <rect x="370" y="134" width="220" height="60" rx="8" fill="white" stroke="#E2E8F0" stroke-width="1"/>
  <text x="390" y="160" fill="#0F172A" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600">Session Manager</text>
  <text x="390" y="178" fill="#64748B" font-family="system-ui, -apple-system, sans-serif" font-size="11">Lifecycle, IPC, window coordination</text>

  <rect x="370" y="206" width="220" height="60" rx="8" fill="white" stroke="#E2E8F0" stroke-width="1"/>
  <text x="390" y="232" fill="#0F172A" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600">Transcription Router</text>
  <text x="390" y="250" fill="#64748B" font-family="system-ui, -apple-system, sans-serif" font-size="11">Streaming vs batch, circuit breaker</text>

  <rect x="370" y="278" width="220" height="60" rx="8" fill="white" stroke="#E2E8F0" stroke-width="1"/>
  <text x="390" y="304" fill="#0F172A" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600">Engine Core</text>
  <text x="390" y="322" fill="#64748B" font-family="system-ui, -apple-system, sans-serif" font-size="11">VAD, failover, prompt assembly</text>

  <rect x="370" y="350" width="220" height="60" rx="8" fill="white" stroke="#E2E8F0" stroke-width="1"/>
  <text x="390" y="376" fill="#0F172A" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600">Performance Monitor</text>
  <text x="390" y="394" fill="#64748B" font-family="system-ui, -apple-system, sans-serif" font-size="11">Latency p50/p95/p99, cloud cost</text>

  <text x="370" y="452" fill="#94A3B8" font-family="system-ui, -apple-system, sans-serif" font-size="11">Electron + TypeScript</text>

  <!-- Arrow 2 -> 3 -->
  <path d="M610 260 L660 260" stroke="#94A3B8" stroke-width="2" stroke-linecap="round" marker-end="url(#arrowhead)"/>

  <!-- Column 3: Backends -->
  <rect x="660" y="70" width="260" height="420" rx="12" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1"/>
  <text x="680" y="98" fill="#1E40AF" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700">Backends</text>
  <text x="680" y="116" fill="#3B82F6" font-family="system-ui, -apple-system, sans-serif" font-size="11">Execution and suggestion layer</text>

  <rect x="680" y="134" width="220" height="60" rx="8" fill="white" stroke="#E2E8F0" stroke-width="1"/>
  <text x="700" y="160" fill="#0F172A" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600">WhisperLiveKit</text>
  <text x="700" y="178" fill="#64748B" font-family="system-ui, -apple-system, sans-serif" font-size="11">Python sidecar, WebSocket streaming</text>

  <rect x="680" y="206" width="220" height="60" rx="8" fill="white" stroke="#E2E8F0" stroke-width="1"/>
  <text x="700" y="232" fill="#0F172A" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600">Local Transcription</text>
  <text x="700" y="250" fill="#64748B" font-family="system-ui, -apple-system, sans-serif" font-size="11">whisper.cpp, Apple Silicon paths</text>

  <rect x="680" y="278" width="220" height="60" rx="8" fill="white" stroke="#E2E8F0" stroke-width="1"/>
  <text x="700" y="304" fill="#0F172A" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600">Cloud Fallbacks</text>
  <text x="700" y="322" fill="#64748B" font-family="system-ui, -apple-system, sans-serif" font-size="11">AssemblyAI, Deepgram, OpenAI</text>

  <rect x="680" y="350" width="220" height="60" rx="8" fill="white" stroke="#E2E8F0" stroke-width="1"/>
  <text x="700" y="376" fill="#0F172A" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600">LLM + Context</text>
  <text x="700" y="394" fill="#64748B" font-family="system-ui, -apple-system, sans-serif" font-size="11">Ollama, RAG, prompt library</text>

  <text x="680" y="452" fill="#94A3B8" font-family="system-ui, -apple-system, sans-serif" font-size="11">Python + native binaries</text>

  <!-- Arrowhead marker -->
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#94A3B8"/>
    </marker>
  </defs>
</svg>
