<svg width="960" height="380" viewBox="0 0 960 380" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="devArrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#94A3B8"/>
    </marker>
    <marker id="devArrowOrange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#F59E0B"/>
    </marker>
  </defs>

  <rect width="960" height="380" rx="16" fill="#FAFBFC"/>

  <text x="40" y="40" fill="#0F172A" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="700">Multi-Agent Development Pipeline</text>
  <text x="40" y="62" fill="#64748B" font-family="system-ui, -apple-system, sans-serif" font-size="13">Task → Plan → Code → Review → Pull Request</text>

  <!-- Step 1: Jira -->
  <rect x="40" y="100" width="140" height="120" rx="10" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1.5"/>
  <text x="60" y="136" fill="#1E40AF" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700">Jira</text>
  <text x="60" y="160" fill="#3B82F6" font-family="system-ui, -apple-system, sans-serif" font-size="12">Задача из backlog</text>
  <text x="60" y="178" fill="#3B82F6" font-family="system-ui, -apple-system, sans-serif" font-size="12">Описание + контекст</text>

  <!-- Arrow -->
  <path d="M180 160 L212 160" stroke="#94A3B8" stroke-width="2" stroke-linecap="round" marker-end="url(#devArrow)"/>

  <!-- Step 2: Planner -->
  <rect x="220" y="100" width="140" height="120" rx="10" fill="#EEF2FF" stroke="#C7D2FE" stroke-width="1.5"/>
  <text x="240" y="136" fill="#3730A3" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700">Planner</text>
  <text x="240" y="156" fill="#6366F1" font-family="system-ui, -apple-system, sans-serif" font-size="12">Техплан</text>
  <text x="240" y="174" fill="#6366F1" font-family="system-ui, -apple-system, sans-serif" font-size="12">Acceptance criteria</text>
  <text x="240" y="192" fill="#6366F1" font-family="system-ui, -apple-system, sans-serif" font-size="12">Structured output</text>

  <!-- Arrow -->
  <path d="M360 160 L392 160" stroke="#94A3B8" stroke-width="2" stroke-linecap="round" marker-end="url(#devArrow)"/>

  <!-- Step 3: Coder -->
  <rect x="400" y="100" width="140" height="120" rx="10" fill="#F0FDF4" stroke="#A7F3D0" stroke-width="1.5"/>
  <text x="420" y="136" fill="#166534" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700">Coder</text>
  <text x="420" y="156" fill="#16A34A" font-family="system-ui, -apple-system, sans-serif" font-size="12">Генерация кода</text>
  <text x="420" y="174" fill="#16A34A" font-family="system-ui, -apple-system, sans-serif" font-size="12">Unit-тесты</text>
  <text x="420" y="192" fill="#16A34A" font-family="system-ui, -apple-system, sans-serif" font-size="12">pytest в sandbox</text>

  <!-- Arrow -->
  <path d="M540 160 L572 160" stroke="#94A3B8" stroke-width="2" stroke-linecap="round" marker-end="url(#devArrow)"/>

  <!-- Step 4: Reviewer -->
  <rect x="580" y="100" width="140" height="120" rx="10" fill="#FEF3C7" stroke="#FDE68A" stroke-width="1.5"/>
  <text x="600" y="136" fill="#92400E" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700">Reviewer</text>
  <text x="600" y="156" fill="#B45309" font-family="system-ui, -apple-system, sans-serif" font-size="12">Корректность</text>
  <text x="600" y="174" fill="#B45309" font-family="system-ui, -apple-system, sans-serif" font-size="12">Стиль и покрытие</text>
  <text x="600" y="192" fill="#B45309" font-family="system-ui, -apple-system, sans-serif" font-size="12">Secret scanning</text>

  <!-- Arrow -->
  <path d="M720 160 L752 160" stroke="#94A3B8" stroke-width="2" stroke-linecap="round" marker-end="url(#devArrow)"/>

  <!-- Step 5: GitHub PR -->
  <rect x="760" y="100" width="160" height="120" rx="10" fill="#F5F3FF" stroke="#DDD6FE" stroke-width="1.5"/>
  <text x="780" y="136" fill="#5B21B6" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700">GitHub PR</text>
  <text x="780" y="156" fill="#7C3AED" font-family="system-ui, -apple-system, sans-serif" font-size="12">Ветка + коммит</text>
  <text x="780" y="174" fill="#7C3AED" font-family="system-ui, -apple-system, sans-serif" font-size="12">Pull Request</text>
  <text x="780" y="192" fill="#7C3AED" font-family="system-ui, -apple-system, sans-serif" font-size="12">Ссылка в Jira</text>

  <!-- Retry loop arrow (Reviewer -> Coder) -->
  <path d="M650 220 L650 265 L470 265 L470 220" stroke="#F59E0B" stroke-width="2" stroke-linecap="round" stroke-dasharray="6 4" fill="none" marker-end="url(#devArrowOrange)"/>
  <text x="510" y="282" fill="#B45309" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600">Retry cycle (max 3 iterations)</text>

  <!-- Bottom legend -->
  <rect x="40" y="310" width="880" height="50" rx="10" fill="#F1F5F9"/>
  <text x="60" y="336" fill="#334155" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600">Стек:</text>
  <text x="108" y="336" fill="#64748B" font-family="system-ui, -apple-system, sans-serif" font-size="13">Python  ·  Claude API  ·  Jira Cloud  ·  GitHub API  ·  pytest</text>
  <text x="60" y="354" fill="#334155" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600">Метрики:</text>
  <text x="122" y="354" fill="#64748B" font-family="system-ui, -apple-system, sans-serif" font-size="13">lead time  ·  итерации  ·  tokens  ·  cost  ·  success rate</text>
</svg>
