<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script>(function(){try{var t=localStorage.getItem('theme');if(t!=='light'&&t!=='dark')t=window.matchMedia('(prefers-color-scheme: light)').matches?'light':'dark';document.documentElement.setAttribute('data-theme',t);}catch(e){document.documentElement.setAttribute('data-theme','dark');}})();</script>
  {%- seo -%}
  <link rel="stylesheet" href="{{ "/assets/main.css" | relative_url }}">
  <link rel="icon" type="image/svg+xml" href="{{ "/favicon.svg" | relative_url }}">
  <meta name="theme-color" content="#09090b">
  <style>
    /* ===== Light theme (default — minima + tweaks) ===== */
    a { color: #2B579A; }
    h1, h2, h3 { color: #1f2d3d; }
    h2 { border-bottom: 1px solid #e8e8e8; padding-bottom: .2em; margin-top: 1.4em; }
    table { border-collapse: collapse; width: 100%; margin: 1em 0; font-size: .95em; }
    th, td { border: 1px solid #e2e6ee; padding: .5em .7em; text-align: left; vertical-align: top; }
    th { background: #f4f6fb; }
    tbody tr:nth-child(even) td { background: #fafbfc; }
    code { background: #f4f6fb; padding: .1em .3em; border-radius: 3px; }
    .site-avatar { width: 150px; height: 150px; border-radius: 50%; object-fit: cover; margin: .3em 0; }
    /* theme toggle button (in header) */
    .theme-toggle { display: inline-flex; align-items: center; justify-content: center; vertical-align: middle; background: none; border: 0; cursor: pointer; padding: 6px; margin: 0 4px; border-radius: 8px; color: #1f2d3d; }
    .theme-toggle:hover { background: rgba(0,0,0,.06); }
    .theme-toggle svg { width: 20px; height: 20px; display: block; }
    .theme-toggle .moon { display: none; }
    html[data-theme="dark"] .theme-toggle .sun { display: none; }
    html[data-theme="dark"] .theme-toggle .moon { display: block; }

    /* ===== Dark theme (toggled via html[data-theme="dark"]) ===== */
    html[data-theme="dark"] { color-scheme: dark; }
    html[data-theme="dark"] body { background: #09090b; color: #e4e4e7; }
    html[data-theme="dark"] .site-header { background: rgba(9,9,11,.9); border-bottom: 1px solid #27272a; }
    html[data-theme="dark"] .site-title, html[data-theme="dark"] .site-title:visited { color: #fafafa; }
    html[data-theme="dark"] .site-nav .page-link, html[data-theme="dark"] .site-nav .page-link:visited { color: #a1a1aa; }
    html[data-theme="dark"] .site-nav .page-link:hover { color: #fafafa; }
    html[data-theme="dark"] .site-nav .menu-icon > svg { fill: #a1a1aa; }
    html[data-theme="dark"] .theme-toggle { color: #a1a1aa; }
    html[data-theme="dark"] .theme-toggle:hover { background: rgba(255,255,255,.08); color: #fafafa; }
    html[data-theme="dark"] .page-content, html[data-theme="dark"] .post-content { background: #09090b; }
    html[data-theme="dark"] .site-footer { background: #09090b; border-top: 1px solid #27272a; color: #a1a1aa; }
    html[data-theme="dark"] .site-footer a, html[data-theme="dark"] .footer-col-wrapper { color: #a1a1aa; }
    html[data-theme="dark"] a { color: #60a5fa; }
    html[data-theme="dark"] a:hover { color: #93c5fd; }
    html[data-theme="dark"] h1, html[data-theme="dark"] h2, html[data-theme="dark"] h3, html[data-theme="dark"] h4, html[data-theme="dark"] h5, html[data-theme="dark"] h6 { color: #fafafa; }
    html[data-theme="dark"] h2 { border-bottom-color: #27272a; }
    html[data-theme="dark"] strong, html[data-theme="dark"] b { color: #fafafa; }
    html[data-theme="dark"] table { color: #e4e4e7 !important; border-color: #27272a !important; }
    html[data-theme="dark"] table th, html[data-theme="dark"] table td { border-color: #27272a !important; }
    html[data-theme="dark"] table th { background-color: #18181b !important; color: #fafafa !important; }
    html[data-theme="dark"] table td { background-color: #0d0d11 !important; color: #e4e4e7 !important; }
    html[data-theme="dark"] table tr:nth-child(even) td { background-color: #141418 !important; }
    html[data-theme="dark"] code { background-color: #1b1b20 !important; color: #e4e4e7; border: 1px solid #27272a; }
    html[data-theme="dark"] pre { background-color: #141418 !important; border: 1px solid #27272a; }
    html[data-theme="dark"] pre code { background: transparent !important; border: 0; }
    html[data-theme="dark"] .highlight, html[data-theme="dark"] .highlighter-rouge .highlight { background: #141418 !important; }
    html[data-theme="dark"] blockquote { color: #a1a1aa; border-left: 4px solid #3f3f46; }
    html[data-theme="dark"] hr { border-top: 1px solid #27272a; }
    html[data-theme="dark"] iframe.demo-frame { border-color: #27272a; background: #0d0d11; }
    @media (max-width: 600px) { html[data-theme="dark"] .site-nav { background-color: #141418; border-color: #27272a; } }
  </style>

  <style>
    /* Demo embeds break out wider than the text column so each demo renders in its
       desktop layout; the auto-fit script below removes any inner scrollbar. */
    figure.demo-figure {
      margin: 1.6em 0;
      margin-left: calc(50% - min(48vw, 590px));
      margin-right: calc(50% - min(48vw, 590px));
    }
    figure.demo-figure figcaption { font-size: .9em; color: #667085; margin-top: .4em; }
    iframe.demo-frame { display: block; width: 100%; border: 1px solid #e2e6ee; border-radius: 8px; background: #fff; }
    iframe.demo-pipeline { height: 760px; }
    iframe.demo-pii { height: 1000px; }
    iframe.demo-consul, iframe.demo-telecom { aspect-ratio: 16 / 9; height: auto; }
    @media (max-width: 760px) {
      iframe.demo-pipeline { height: 560px; }
      iframe.demo-pii { height: 680px; }
    }
  </style>
  <script>
    /* Auto-fit demo iframes to their content so they never need an inner scrollbar.
       Same-origin only (the demos are served from this site). Grows to content;
       re-baselines on resize; watches dynamic demos (e.g. AI Consul typing) via ResizeObserver. */
    (function () {
      function measure(f) {
        var d = f.contentWindow.document, e = d.documentElement, b = d.body;
        return Math.max(e ? e.scrollHeight : 0, b ? b.scrollHeight : 0, b ? b.offsetHeight : 0);
      }
      function grow(f) {
        try { var h = measure(f); if (h && h > f.clientHeight + 1) { f.style.height = h + 'px'; } } catch (e) {}
      }
      function grow2(f) { grow(f); requestAnimationFrame(function () { grow(f); }); }
      function watch(f) {
        try {
          var w = f.contentWindow, RO = w.ResizeObserver || window.ResizeObserver;
          if (!RO) return;
          var ro = new RO(function () { grow(f); });
          ro.observe(w.document.documentElement);
          if (w.document.body) ro.observe(w.document.body);
        } catch (e) {}
      }
      function init(f) { f.addEventListener('load', function () { grow2(f); watch(f); }); grow2(f); }
      function all(fn) { var fs = document.querySelectorAll('iframe.demo-frame'); for (var i = 0; i < fs.length; i++) fn(fs[i]); }
      function start() { all(init); }
      if (document.readyState === 'loading') { document.addEventListener('DOMContentLoaded', start); } else { start(); }
      window.addEventListener('load', function () { all(grow2); });
      var t;
      window.addEventListener('resize', function () {
        clearTimeout(t);
        t = setTimeout(function () { all(function (f) { f.style.height = ''; grow2(f); }); }, 150);
      });
    })();
  </script>
