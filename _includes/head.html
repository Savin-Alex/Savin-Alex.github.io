<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  {%- seo -%}
  <link rel="stylesheet" href="{{ "/assets/main.css" | relative_url }}">
  <link rel="icon" type="image/svg+xml" href="{{ "/favicon.svg" | relative_url }}">
  <meta name="theme-color" content="#09090b">
  <style>
    /* Dark theme — matches the homepage one-pager (overrides minima's light defaults) */
    :root { color-scheme: dark; }
    html, body { background: #09090b; color: #e4e4e7; }
    .site-header { background: rgba(9,9,11,.9); border-top: 0; border-bottom: 1px solid #27272a; }
    .site-title, .site-title:visited { color: #fafafa !important; }
    .site-nav .page-link, .site-nav .page-link:visited { color: #a1a1aa; }
    .site-nav .page-link:hover { color: #fafafa; }
    .site-nav .menu-icon > svg { fill: #a1a1aa; }
    .page-content, .post-content { background: #09090b; }
    .site-footer { background: #09090b; border-top: 1px solid #27272a; color: #a1a1aa; }
    .site-footer a, .footer-col-wrapper { color: #a1a1aa; }
    a { color: #60a5fa; }
    a:hover { color: #93c5fd; }
    h1, h2, h3, h4, h5, h6 { color: #fafafa; }
    h2 { border-bottom: 1px solid #27272a; padding-bottom: .2em; margin-top: 1.4em; }
    strong, b { color: #fafafa; }
    table { border-collapse: collapse; width: 100%; margin: 1em 0; font-size: .95em; color: #e4e4e7 !important; border: 1px solid #27272a !important; }
    table th, table td { border: 1px solid #27272a !important; padding: .5em .7em; text-align: left; vertical-align: top; }
    table th { background-color: #18181b !important; color: #fafafa !important; }
    table td { background-color: #0d0d11 !important; color: #e4e4e7 !important; }
    table tr:nth-child(even) td { background-color: #141418 !important; }
    code { background-color: #1b1b20 !important; color: #e4e4e7; padding: .1em .3em; border-radius: 3px; border: 1px solid #27272a; }
    pre { background-color: #141418 !important; border: 1px solid #27272a; }
    pre code { background: transparent !important; border: 0; }
    .highlight, .highlighter-rouge .highlight { background: #141418 !important; }
    blockquote { color: #a1a1aa; border-left: 4px solid #3f3f46; }
    hr { border: 0; border-top: 1px solid #27272a; }
    .site-avatar { width: 150px; height: 150px; border-radius: 50%; object-fit: cover; margin: .3em 0; }
    @media (max-width: 600px) { .site-nav { background-color: #141418; border-color: #27272a; } }
  </style>
  {%- feed_meta -%}
  {%- if jekyll.environment == 'production' and site.google_analytics -%}
    {%- include google-analytics.html -%}
  {%- endif -%}
  <style>
    /* Demo embeds break out wider than the text column so each demo renders in its
       desktop layout; the auto-fit script below removes any inner scrollbar. */
    figure.demo-figure {
      margin: 1.6em 0;
      margin-left: calc(50% - min(48vw, 590px));
      margin-right: calc(50% - min(48vw, 590px));
    }
    figure.demo-figure figcaption { font-size: .9em; color: #667085; margin-top: .4em; }
    iframe.demo-frame { display: block; width: 100%; border: 1px solid #27272a; border-radius: 8px; background: #0d0d11; }
    iframe.demo-pipeline { height: 760px; }
    iframe.demo-pii { height: 1000px; }
    iframe.demo-consul, iframe.demo-telecom { aspect-ratio: 16 / 9; height: auto; }
    @media (max-width: 760px) {
      iframe.demo-pipeline { height: 560px; }
      iframe.demo-pii { height: 680px; }
    }
  </style>
  <script>
    /* Auto-fit demo iframes to their content so they never need an inner scrollbar.
       Same-origin only (the demos are served from this site). Grows to content;
       re-baselines on resize; watches dynamic demos (e.g. AI Consul typing) via ResizeObserver. */
    (function () {
      function measure(f) {
        var d = f.contentWindow.document, e = d.documentElement, b = d.body;
        return Math.max(e ? e.scrollHeight : 0, b ? b.scrollHeight : 0, b ? b.offsetHeight : 0);
      }
      function grow(f) {
        try { var h = measure(f); if (h && h > f.clientHeight + 1) { f.style.height = h + 'px'; } } catch (e) {}
      }
      function grow2(f) { grow(f); requestAnimationFrame(function () { grow(f); }); }
      function watch(f) {
        try {
          var w = f.contentWindow, RO = w.ResizeObserver || window.ResizeObserver;
          if (!RO) return;
          var ro = new RO(function () { grow(f); });
          ro.observe(w.document.documentElement);
          if (w.document.body) ro.observe(w.document.body);
        } catch (e) {}
      }
      function init(f) { f.addEventListener('load', function () { grow2(f); watch(f); }); grow2(f); }
      function all(fn) { var fs = document.querySelectorAll('iframe.demo-frame'); for (var i = 0; i < fs.length; i++) fn(fs[i]); }
      function start() { all(init); }
      if (document.readyState === 'loading') { document.addEventListener('DOMContentLoaded', start); } else { start(); }
      window.addEventListener('load', function () { all(grow2); });
      var t;
      window.addEventListener('resize', function () {
        clearTimeout(t);
        t = setTimeout(function () { all(function (f) { f.style.height = ''; grow2(f); }); }, 150);
      });
    })();
  </script>
</head>
